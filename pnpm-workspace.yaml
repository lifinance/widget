  - '@lifi/*'
overrides:
  '@react-native-async-storage/async-storage': '>=2.2.0'
  '@reown/appkit': '>=1.8.20'
  '@reown/appkit>@walletconnect/universal-provider': '>=2.23.9'
  '@safe-global/safe-apps-provider': '>=0.18.6'
  '@walletconnect/utils>viem': '>=2.48.11'
  '@reown/appkit-adapter-wagmi>@wagmi/core': '3.5.0'
  '@msgpack/msgpack': '>=3.1.3'
  abitype: '>=1.2.4'
  axios: '^1.16.0'
  viem: '>=2.52.0'
  bs58: '>=4.0.1'
  miniflare>zod: '3.22.3'
  miniflare>zod-validation-error: '3.0.3'
  preact: '>=10.29.1'
  use-sync-external-store: '1.4.0'
  utf-8-validate: '6.0.6'
  zod: '>=4.4.3'
allowBuilds:
